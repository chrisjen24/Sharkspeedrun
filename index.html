<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guardian Raid Speed Run — crisjen</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #050a14;
      --deep:      #080f1e;
      --panel:     #0a1628;
      --panel2:    #0d1c35;
      --border:    #1a3a5c;
      --border2:   #0f2240;
      --cyan:      #2de0f7;
      --cyan-dim:  #1a8aa0;
      --cyan-glow: rgba(45,224,247,0.18);
      --gold:      #c8a84b;
      --gold-light:#f5d97a;
      --gold-dim:  #7a5f20;
      --teal:      #0fd4c8;
      --purple:    #6b3fa0;
      --text:      #d4e8f5;
      --muted:     #5a7a96;
      --white:     #eaf4ff;
    }

    html, body {
      min-height: 100%;
      background: var(--navy);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      overflow-x: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 100% 60% at 50% 0%, rgba(13,50,100,0.9) 0%, transparent 65%),
        radial-gradient(ellipse 70% 50% at 0% 100%, rgba(107,63,160,0.25) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 60%, rgba(45,224,247,0.07) 0%, transparent 55%),
        linear-gradient(180deg, #020611 0%, #050a18 40%, #060c1a 100%);
    }

    .stars {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 8%,  rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 12%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 65%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 88% 20%, rgba(45,224,247,0.6) 0%, transparent 100%),
        radial-gradient(2px 2px at 5%  50%, rgba(45,224,247,0.4) 0%, transparent 100%);
    }

    .scanline {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.12;
      animation: scan 8s linear infinite;
      z-index: 1;
    }
    @keyframes scan { from { top: -2px; } to { top: 100vh; } }

    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 20px 80px;
    }

    /* ─── Streamer bar ─── */
    .streamer-bar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 44px;
      animation: fadeDown 0.6s ease both;
    }
    .streamer-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid var(--cyan-dim);
      background: linear-gradient(135deg, var(--purple), var(--cyan-dim));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif; font-size: 0.85rem;
      color: var(--cyan); font-weight: 700;
      box-shadow: 0 0 12px rgba(45,224,247,0.25);
    }
    .streamer-name {
      font-family: 'Cinzel', serif; font-size: 0.78rem;
      letter-spacing: 3px; color: var(--cyan); text-transform: uppercase;
      display: block;
    }
    .streamer-tag {
      font-size: 0.68rem; color: var(--muted); letter-spacing: 1px; display: block;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #e84040;
      display: inline-block; margin-right: 5px;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }
    @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* ─── Hero ─── */
    .hero {
      text-align: center; max-width: 700px;
      margin-bottom: 40px;
      animation: fadeDown 0.8s ease 0.1s both;
    }
    .ornament {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 18px;
    }
    .orn-line { height: 1px; width: 70px; background: linear-gradient(90deg, transparent, var(--cyan-dim)); }
    .orn-line.r { background: linear-gradient(90deg, var(--cyan-dim), transparent); }
    .orn-dia { width: 8px; height: 8px; background: var(--cyan); transform: rotate(45deg); box-shadow: 0 0 8px var(--cyan); }
    .orn-dia-sm { width: 4px; height: 4px; background: var(--gold); transform: rotate(45deg); }

    .event-label {
      font-family: 'Cinzel', serif; font-size: 0.68rem;
      letter-spacing: 6px; color: var(--gold);
      text-transform: uppercase; margin-bottom: 14px; opacity: 0.85;
    }
    h1 {
      font-family: 'Cinzel', serif; font-weight: 700;
      font-size: clamp(2rem, 5.5vw, 3.4rem); line-height: 1.15;
      color: var(--white);
      text-shadow: 0 0 40px rgba(45,224,247,0.35), 0 2px 12px rgba(0,0,0,0.9);
      letter-spacing: 2px;
    }
    h1 span { color: var(--cyan); text-shadow: 0 0 20px rgba(45,224,247,0.9), 0 0 60px rgba(45,224,247,0.3); }
    .hero-sub {
      margin-top: 16px; font-size: 1rem;
      color: var(--muted); font-style: italic;
      font-family: 'Noto Serif', serif; line-height: 1.7;
    }

    /* ─── Panel ─── */
    .panel-wrap {
      width: 100%; max-width: 560px; position: relative;
      animation: fadeUp 0.9s ease 0.25s both;
    }
    .panel-wrap::before {
      content: ''; position: absolute; inset: -1px;
      background: linear-gradient(135deg, var(--cyan-dim), transparent 40%, var(--gold-dim));
      z-index: -1; opacity: 0.5;
    }
    .panel {
      background: linear-gradient(160deg, #0d1e38 0%, #09152a 60%, #080f22 100%);
      border: 1px solid var(--border); position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(45,224,247,0.1);
    }
    .corner { position: absolute; width: 16px; height: 16px; }
    .corner.tl { top:-1px; left:-1px;  border-top:2px solid var(--cyan-dim); border-left:2px solid var(--cyan-dim); }
    .corner.tr { top:-1px; right:-1px; border-top:2px solid var(--cyan-dim); border-right:2px solid var(--cyan-dim); }
    .corner.bl { bottom:-1px; left:-1px;  border-bottom:2px solid var(--cyan-dim); border-left:2px solid var(--cyan-dim); }
    .corner.br { bottom:-1px; right:-1px; border-bottom:2px solid var(--cyan-dim); border-right:2px solid var(--cyan-dim); }

    .panel-header {
      background: linear-gradient(90deg, rgba(45,224,247,0.08), transparent);
      border-bottom: 1px solid rgba(45,224,247,0.1);
      padding: 14px 28px;
      display: flex; align-items: center; gap: 12px;
    }
    .panel-header-icon { font-size: 1rem; filter: drop-shadow(0 0 6px var(--cyan)); }
    .panel-header-title {
      font-family: 'Cinzel', serif; font-size: 0.7rem;
      letter-spacing: 4px; color: var(--cyan); text-transform: uppercase; flex: 1;
    }
    .panel-header-tag {
      font-size: 0.62rem; letter-spacing: 2px; color: var(--gold-dim);
      background: rgba(200,168,75,0.07); border: 1px solid rgba(200,168,75,0.18);
      padding: 2px 8px;
    }

    .panel-body { padding: 28px 34px 36px; }

    /* ─── Fields ─── */
    .field { margin-bottom: 22px; }
    label {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Cinzel', serif; font-size: 0.65rem;
      letter-spacing: 3px; color: var(--cyan-dim);
      text-transform: uppercase; margin-bottom: 8px;
    }
    label::before {
      content: ''; display: inline-block;
      width: 3px; height: 10px;
      background: var(--cyan); box-shadow: 0 0 6px var(--cyan); flex-shrink: 0;
    }
    input, select {
      width: 100%;
      background: rgba(5,15,35,0.85);
      border: 1px solid var(--border2);
      border-bottom-color: var(--border);
      color: var(--white);
      font-family: 'Exo 2', sans-serif; font-size: 0.96rem; font-weight: 300;
      padding: 11px 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      appearance: none; -webkit-appearance: none; letter-spacing: 0.5px;
    }
    input::placeholder { color: #233552; }
    input:focus, select:focus {
      border-color: var(--cyan-dim);
      background: rgba(45,224,247,0.03);
      box-shadow: 0 0 0 2px rgba(45,224,247,0.06), inset 0 1px 6px rgba(0,0,0,0.5);
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .field-hint { font-size: 0.7rem; color: var(--muted); margin-top: 5px; }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '◆'; position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); color: var(--cyan-dim); font-size: 0.45rem; pointer-events: none;
    }
    select option { background: #080f1e; color: var(--white); }

    .divider {
      display: flex; align-items: center; gap: 10px; margin: 24px 0 22px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border));
    }
    .divider::after { background: linear-gradient(90deg, var(--border), transparent); }
    .divider span { font-size: 0.5rem; letter-spacing: 4px; color: var(--border); font-family: 'Cinzel', serif; }

    /* ─── Button ─── */
    .btn {
      width: 100%; padding: 14px 24px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0a2a4a 0%, #0d3060 50%, #0a2a4a 100%);
      border: 1px solid var(--cyan-dim);
      color: var(--cyan); font-family: 'Cinzel', serif;
      font-size: 0.78rem; letter-spacing: 5px; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s ease;
      box-shadow: 0 0 20px rgba(45,224,247,0.1), inset 0 1px 0 rgba(45,224,247,0.12);
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(45,224,247,0.15), transparent 50%);
      opacity: 0; transition: opacity 0.25s;
    }
    .btn::after {
      content: ''; position: absolute;
      top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(45,224,247,0.1), transparent);
      transition: left 0.5s ease;
    }
    .btn:hover::after { left: 150%; }
    .btn:hover {
      border-color: var(--cyan); color: var(--white);
      box-shadow: 0 0 30px rgba(45,224,247,0.22), 0 0 60px rgba(45,224,247,0.07);
      transform: translateY(-1px);
    }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ─── Status ─── */
    .status {
      margin-top: 16px; padding: 13px 16px;
      font-family: 'Cinzel', serif; font-size: 0.67rem;
      letter-spacing: 2px; text-align: center;
      display: none; border-left: 3px solid;
    }
    .status.success { display:block; border-color: var(--teal); background: rgba(15,212,200,0.05); color: var(--teal); }
    .status.error   { display:block; border-color: #e84040; background: rgba(232,64,64,0.06); color: #f07070; }

    /* ─── Stats strip ─── */
    .stats-bar {
      width: 100%; max-width: 560px;
      display: grid; grid-template-columns: repeat(3,1fr);
      border: 1px solid var(--border2); border-top: none;
      animation: fadeUp 0.9s ease 0.35s both;
    }
    .stat {
      padding: 12px 16px; text-align: center;
      background: rgba(5,15,35,0.55);
      border-right: 1px solid var(--border2);
    }
    .stat:last-child { border-right: none; }
    .stat-val { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold-light); text-shadow: 0 0 10px rgba(245,217,122,0.4); display:block; }
    .stat-lbl { font-size: 0.58rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; display:block; margin-top: 2px; }

    /* ─── Setup note ─── */
    .setup-note {
      max-width: 560px; margin-top: 32px;
      padding: 18px 22px; border: 1px solid var(--border2);
      background: rgba(5,15,35,0.5);
      font-size: 0.83rem; color: var(--muted); line-height: 1.85;
      animation: fadeUp 1s ease 0.45s both;
    }
    .setup-note strong {
      color: var(--gold-dim); font-family: 'Cinzel', serif;
      font-size: 0.64rem; letter-spacing: 3px;
      display: block; margin-bottom: 10px; text-transform: uppercase;
    }
    .setup-note code {
      display: block; margin-top: 10px;
      background: rgba(0,0,0,0.45); border: 1px solid var(--border2);
      border-left: 3px solid var(--cyan-dim);
      padding: 12px 14px; font-size: 0.76rem;
      color: var(--cyan); white-space: pre-wrap; line-height: 1.7;
    }
    .inline-code {
      background: rgba(0,0,0,0.4); border: 1px solid var(--border2);
      padding: 1px 6px; font-size: 0.8rem; color: var(--gold-light);
    }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }

    @media (max-width: 500px) {
      .panel-body { padding: 22px 18px 28px; }
      .stats-bar { grid-template-columns: 1fr 1fr; }
      .stat:nth-child(3) { grid-column: 1 / -1; border-top: 1px solid var(--border2); border-right: none; }
    }
  </style>
</head>
<body>
<div class="bg"></div>
<div class="stars"></div>
<div class="scanline"></div>

<div class="page">

  <!-- Streamer bar -->
  <div class="streamer-bar">
    <div class="streamer-avatar">CR</div>
    <div>
      <span class="streamer-name">crisjen</span>
      <span class="streamer-tag"><span class="live-dot"></span>twitch.tv/crisjen</span>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="ornament">
      <div class="orn-line"></div>
      <div class="orn-dia-sm"></div>
      <div class="orn-dia"></div>
      <div class="orn-dia-sm"></div>
      <div class="orn-line r"></div>
    </div>
    <div class="event-label">◆ &nbsp; Guardian Raid Event &nbsp; ◆</div>
    <h1>Guardian Raid<br><span>Speed Run</span></h1>
    <p class="hero-sub">Register your warrior and claim your place among the elite.<br>Only the swiftest hunters will stand victorious.</p>
  </div>

  <!-- Form -->
  <div class="panel-wrap">
    <div class="panel">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>

      <div class="panel-header">
        <span class="panel-header-icon">⚔</span>
        <span class="panel-header-title">Registration</span>
        <span class="panel-header-tag">Season 1</span>
      </div>

      <div class="panel-body">
        <div class="field">
          <label for="charName">Character Name</label>
          <input type="text" id="charName" placeholder="Enter your character's name" autocomplete="off"/>
        </div>

        <div class="field">
          <label for="combatPower">Combat Power</label>
          <input type="number" id="combatPower" placeholder="e.g. 1620" min="0" max="9999" autocomplete="off"/>
          <div class="field-hint">Your current combat power</div>
        </div>

        <div class="field">
          <label for="charClass">Class</label>
          <div class="select-wrap">
            <select id="charClass">
              <option value="" disabled selected>— Select your class —</option>
              <optgroup label="Warriors">
                <option>Berserker</option><option>Paladin</option>
                <option>Gunlancer</option><option>Destroyer</option><option>Slayer</option>
              </optgroup>
              <optgroup label="Martial Artists">
                <option>Striker</option><option>Wardancer</option><option>Scrapper</option>
                <option>Soulfist</option><option>Glaivier</option><option>Breaker</option>
              </optgroup>
              <optgroup label="Gunners">
                <option>Sharpshooter</option><option>Deadeye</option>
                <option>Artillerist</option><option>Machinist</option><option>Gunslinger</option>
              </optgroup>
              <optgroup label="Mages">
                <option>Bard</option><option>Sorceress</option>
                <option>Arcanist</option><option>Summoner</option>
              </optgroup>
              <optgroup label="Assassins">
                <option>Shadowhunter</option><option>Deathblade</option><option>Reaper</option>
              </optgroup>
              <optgroup label="Specialists">
                <option>Artist</option><option>Aeromancer</option>
              </optgroup>
            </select>
          </div>
        </div>

        <div class="divider"><span>◆◆◆</span></div>

        <button class="btn" id="submitBtn" onclick="submitForm()">◆ &nbsp; Enlist Now &nbsp; ◆</button>
        <div class="status" id="statusMsg"></div>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" style="grid-template-columns: 1fr;">
    <div class="stat" style="border-right:none;">
      <span class="stat-val">Speed Run</span>
      <span class="stat-lbl">Format</span>
    </div>
  </div>



</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzne2n0YIG8q4eEldGEfwlLKn8lvdBY9RJXOpzNqVCOuCfMC_osC-0JATaNaACu1M5BeQ/exec';

  async function submitForm() {
    const charName    = document.getElementById('charName').value.trim();
    const combatPower = document.getElementById('combatPower').value.trim();
    const charClass   = document.getElementById('charClass').value;
    const btn         = document.getElementById('submitBtn');
    const status      = document.getElementById('statusMsg');

    status.className = 'status';

    if (!charName || !combatPower || !charClass) {
      status.className = 'status error';
      status.textContent = '⚠  All fields are required, warrior.';
      return;
    }
    if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL') {
      status.className = 'status error';
      status.textContent = '⚠  Apps Script URL not configured. See setup instructions below.';
      return;
    }

    btn.disabled = true;
    btn.textContent = '◆  Enlisting…  ◆';

    try {
      await fetch(APPS_SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ charName, combatPower, charClass })
      });
      status.className = 'status success';
      status.textContent = '✔  Registered! Your name has been added to the raid roster.';
      document.getElementById('charName').value = '';
      document.getElementById('combatPower').value = '';
      document.getElementById('charClass').value = '';
    } catch (err) {
      status.className = 'status error';
      status.textContent = '⚠  Connection lost. Please try again.';
    }

    btn.disabled = false;
    btn.textContent = '◆  Enlist Now  ◆';
  }
</script>
</body>
</html>
